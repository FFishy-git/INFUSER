# @package _global_
#
# Baseline: Solver trained on questions pre-generated by Qwen3-32B.
# Based on FW-Alr_2e-6-DrGRPO-TIS_token with pre-generated questions.
# Benchmark eval enabled during training.
#
# Usage:
#   python -m verl_inf_evolve.main experiment_qwen3_8b_base=FW-Alr_2e-6-DrGRPO-TIS_token-gen_qw32b

generator:
  model:
    path: Qwen/Qwen3-8B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

solver:
  model:
    path: Qwen/Qwen3-8B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

training:
  fix_generator: true
  remote_sync_path: hf://datasets/__namespace__/SER/qwen3_8b_base/${wandb.group_name}
  skip_dev_rollout: true
  pregenerated_question_source: hf://datasets/__namespace__/SER/qwen3_32b_gen_only
  generator_reward_components: [invalid_rewards]
  gen_invalid_penalty: 0.0

algorithm:
  use_global_batch_norm: true
  solver_normalization_mode: none
  generator_normalization_mode: none

benchmark_eval:
  enabled: true
  use_public_eval_prompt: false

wandb:
  project_name: self-evolution-v3_2-qwen3-8b-base
  group_name: FW-Alr_2e-6-DrGRPO-TIS_token-gen_qw32b
