# @package _global_
#
# Ablation of FW-Alr_2e-6-Glr_4e-6-DrGRPO-TIS_token-dev_800-precond_cos:
# generator advantage normalization uses batch_std (subtract per-group mean,
# divide by std of centered advantages across the whole batch) instead of
# hybrid_std.
#
# Usage:
#   python -m verl_inf_evolve.main experiment_qwen3_8b_base=FW-Alr_2e-6-Glr_4e-6-DrGRPO-TIS_token-dev_800-precond_cos-batch_std

generator:
  model:
    path: Qwen/Qwen3-8B-Base
  actor:
    optim:
      lr: 4e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

solver:
  model:
    path: Qwen/Qwen3-8B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

algorithm:
  use_global_batch_norm: true
  solver_normalization_mode: none
  generator_normalization_mode: batch_std

influence:
  similarity_mode: preconditioned_cosine

training:
  dev_dataset_path: ".cache/data/preprocessed/curriculum_pool/supergpqa_science_800.json"
  remote_sync_path: hf://datasets/__namespace__/SER/qwen3_8b_base/${wandb.group_name}

benchmark_eval:
  enabled: true

  use_public_eval_prompt: false
wandb:
  project_name: self-evolution-v3_2-qwen3-8b-base
  group_name: FW-Alr_2e-6-Glr_4e-6-DrGRPO-TIS_token-dev_800-precond_cos-batch_std
