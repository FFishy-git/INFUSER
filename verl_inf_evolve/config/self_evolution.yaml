# =============================================================================
# V3 Self-Evolution Pipeline — Default Hydra Config
#
# Two independent actor_rollout_ref groups: generator and solver.
# Each follows verl's ActorRolloutRefWorker schema (see verl/trainer/config/).
#
# Usage:
#   python -m verl_inf_evolve.main
#   python -m verl_inf_evolve.main generator.model.path=/new/path training.max_ans_loop=5
# =============================================================================

defaults:
  - _self_
  - optional experiment_qwen3_4b_base: null
  - optional experiment_qwen3_8b_base: null
  - optional experiment_olmo_3_7b_instruct_sft: null

# ---------------------------------------------------------------------------
# Generator (question generation from documents)
# ---------------------------------------------------------------------------
generator:
  hybrid_engine: true

  model:
    path: Qwen/Qwen3-8B-Base
    external_lib: null
    override_config: {}
    enable_gradient_checkpointing: true
    use_remove_padding: true
    use_fused_kernels: true
    fused_kernel_options:
      impl_backend: torch
    lora_rank: 0
    lora_alpha: 16
    target_modules: all-linear
    trust_remote_code: true

  actor:
    _target_: verl.workers.config.FSDPActorConfig
    strategy: fsdp
    rollout_n: ${generator.rollout.n}
    # Global number of prompts per mini-batch (divided by dp_size * rollout_n internally)
    ppo_mini_batch_size: 32
    # When true, override ppo_mini_batch_size to total_samples // world_size so
    # the entire batch is a single minibatch (fully on-policy, no minibatch splitting).
    on_policy_minibatch: false
    ppo_micro_batch_size: null      # deprecated; use ppo_micro_batch_size_per_gpu
    ppo_micro_batch_size_per_gpu: 4
    use_dynamic_bsz: false
    ppo_max_token_len_per_gpu: 16384 # won't be used since we turn off dynamic_bsz.
    grad_clip: 1.0
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    entropy_coeff: 0.0
    calculate_entropy: true
    use_kl_loss: false
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    shuffle: false
    use_torch_compile: false
    use_fused_kernels: ${generator.model.use_fused_kernels}
    ulysses_sequence_parallel_size: 1
    loss_agg_mode: token-mean
    policy_loss:
      loss_mode: vanilla
    checkpoint:
      # save_contents: ['model', 'optimizer', 'extra', 'hf_model']
      save_contents: ['hf_model'] # only save hf_model for generator to reduce checkpoint size
      # load_contents: ['model', 'optimizer', 'extra', 'hf_model']
      load_contents: ['hf_model']
      hf_save_dtype: bf16  # convert HF weights to bfloat16 (halves checkpoint size); null for fp32
    optim:
      _target_: verl.workers.config.FSDPOptimizerConfig
      optimizer: AdamW
      optimizer_impl: torch.optim
      lr: 1e-6
      lr_warmup_steps: -1
      lr_warmup_steps_ratio: 0.0
      min_lr_ratio: 0.0
      lr_scheduler_type: constant
      total_training_steps: -1
      weight_decay: 0.01
      betas: [0.9, 0.999]
      clip_grad: 1.0
      num_cycles: 0.5
      warmup_style: null
      override_optimizer_config: null
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      wrap_policy:
        min_num_params: 0
      param_offload: false
      optimizer_offload: true       # offload Adam states to CPU; frees ~25 GB/GPU for vLLM init
      reshard_after_forward: true
      fsdp_size: -1

  rollout:
    _target_: verl.workers.config.RolloutConfig
    name: vllm
    seed: ${training.seed}
    # --- Sampling ---
    temperature: 0.7
    top_k: -1
    top_p: 1.0
    n: 8                           # 8 question candidates per document
    # --- Sequence length limits ---
    prompt_length: 4096
    response_length: 8192
    # --- vLLM resource tuning ---
    gpu_memory_utilization: 0.6   # H100 80GB — leaves headroom for training via free_cache_engine
    max_num_batched_tokens: 32768  # allow dense prefill batches (up to ~8 prompts at 4K)
    tensor_model_parallel_size: 1  # 8B model fits on 1 GPU
    enforce_eager: false            # enable CUDA graphs for decode-step performance
    max_model_len: 16384
    # --- Truncated importance sampling ---
    calculate_log_probs: true
    log_prob_micro_batch_size: null  # deprecated; use log_prob_micro_batch_size_per_gpu
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_use_dynamic_bsz: ${generator.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${generator.actor.ppo_max_token_len_per_gpu}
    # --- Weight sync (FSDP → vLLM) ---
    update_weights_bucket_megabytes: 2048
    # --- Fields accessed directly by verl's _build_rollout() / __init__ ---
    data_parallel_size: 1
    pipeline_model_parallel_size: 1
    load_format: dummy
    free_cache_engine: true
    # --- AgentLoopManager / AgentLoopWorker fields ---
    agent:
      _target_: verl.workers.config.AgentLoopConfig
      num_workers: 4
      default_agent_loop: single_turn_agent
      agent_loop_config_path: null
      enable_progress: true
      progress_log_interval_seconds: 60.0
      progress_log_interval_samples: 64
    prometheus:
      _target_: verl.workers.config.PrometheusConfig
      enable: false
    disable_log_stats: true

  ref:
    _target_: verl.workers.config.FSDPActorConfig
    strategy: ${generator.actor.strategy}
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      param_offload: false
      reshard_after_forward: true
      forward_only: true
      wrap_policy:
        min_num_params: 0
    use_torch_compile: ${generator.actor.use_torch_compile}
    use_fused_kernels: ${generator.model.use_fused_kernels}
    log_prob_micro_batch_size: null  # deprecated; use log_prob_micro_batch_size_per_gpu
    log_prob_micro_batch_size_per_gpu: null
    log_prob_use_dynamic_bsz: ${generator.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${generator.actor.ppo_max_token_len_per_gpu}
    ulysses_sequence_parallel_size: ${generator.actor.ulysses_sequence_parallel_size}
    entropy_from_logits_with_chunking: false

