# @package _global_
#
# Experiment: OLMo-3-7B-Instruct, generator lr=4e-6, solver lr=2e-6
# Influence similarity mode: preconditioned_cosine
# Benchmark eval enabled during training.
#
# Usage:
#   python -m verl_inf_evolve.main experiment_olmo_3_7b_instruct_sft=FW-Alr_2e-6-Glr_4e-6-DrGRPO-TIS_token-dev_800-precond_cos

generator:
  model:
    path: allenai/Olmo-3-7B-Instruct-SFT
  actor:
    optim:
      lr: 4e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

solver:
  model:
    path: allenai/Olmo-3-7B-Instruct-SFT
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

algorithm:
  use_global_batch_norm: true
  solver_normalization_mode: none
  generator_normalization_mode: hybrid_std

influence:
  similarity_mode: preconditioned_cosine

training:
  dev_dataset_path: ".cache/data/preprocessed/curriculum_pool/supergpqa_science_800.json"
  remote_sync_path: hf://datasets/__namespace__/SER/olmo_3_7b_instruct_sft/${wandb.group_name}

benchmark_eval:
  enabled: true

  use_public_eval_prompt: false
wandb:
  project_name: olmo-3-7b-instruct-sft
  group_name: FW-Alr_2e-6-Glr_4e-6-DrGRPO-TIS_token-dev_800-precond_cos
