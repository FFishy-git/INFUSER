# @package _global_
#
# Experiment: OLMo-3-7B-Instruct, generator fixed, solver trained with lr=2e-6
# DrGRPO version of FW-Alr_2e-6-vanilla_smtm-TIS_token
# Benchmark eval enabled during training.
#
# Usage:
#   python -m verl_inf_evolve.main experiment_olmo_3_7b_instruct_sft=FW-Alr_2e-6-DrGRPO-TIS_token

generator:
  model:
    path: allenai/Olmo-3-7B-Instruct-SFT
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

solver:
  model:
    path: allenai/Olmo-3-7B-Instruct-SFT
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 4

training:
  fix_generator: true
  remote_sync_path: hf://datasets/__namespace__/SER/olmo_3_7b_instruct_sft/${wandb.group_name}
  skip_dev_rollout: true
  generator_reward_components: [invalid_rewards] # skip every reward in this way
  gen_invalid_penalty: 0.0

algorithm:
  use_global_batch_norm: true
  solver_normalization_mode: none
  generator_normalization_mode: none

benchmark_eval:
  enabled: true

  use_public_eval_prompt: false
wandb:
  project_name: olmo-3-7b-instruct-sft
  group_name: FW-Alr_2e-6-DrGRPO-TIS_token
