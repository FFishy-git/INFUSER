# @package _global_
#
# Experiment: Qwen3-4B-Base, generator fixed, solver trained with lr=2e-6
# DrGRPO version of FW-Alr_2e-6-vanilla_smtm-TIS_token
# Seed 456 variant for multi-seed comparison.
# Benchmark eval enabled during training.
#
# Usage:
#   python -m verl_inf_evolve.main experiment_qwen3_4b_base=FW-Alr_2e-6-DrGRPO-TIS_token-seed456

generator:
  model:
    path: Qwen/Qwen3-4B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 8

solver:
  model:
    path: Qwen/Qwen3-4B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 8

training:
  seed: 456
  fix_generator: true
  remote_sync_path: hf://datasets/__namespace__/SER/qwen3_4b_base/${wandb.group_name}
  skip_dev_rollout: true
  generator_reward_components: [invalid_rewards] # skip every reward in this way
  gen_invalid_penalty: 0.0

algorithm:
  use_global_batch_norm: true
  solver_normalization_mode: none
  generator_normalization_mode: none

benchmark_eval:
  enabled: true

  use_public_eval_prompt: false
wandb:
  project_name: self-evolution-v3_2-qwen3-4b-base
  group_name: FW-Alr_2e-6-DrGRPO-TIS_token-seed456
