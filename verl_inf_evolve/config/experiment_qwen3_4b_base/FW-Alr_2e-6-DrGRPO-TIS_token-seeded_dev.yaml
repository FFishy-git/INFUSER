# @package _global_
#
# Experiment: Qwen3-4B-Base, fixed generator, seeded baseline
# Generator is FROZEN. Questions generated from few-shot seed examples.
# No dev rollout, no influence scoring — solver-only training (DrGRPO).
#
# Usage:
#   python -m verl_inf_evolve.main experiment_qwen3_4b_base=FW-Alr_2e-6-DrGRPO-TIS_token-seeded_dev

generator:
  model:
    path: Qwen/Qwen3-4B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 8

solver:
  model:
    path: Qwen/Qwen3-4B-Base
  actor:
    optim:
      lr: 2e-6
    loss_agg_mode: token-mean
    ppo_micro_batch_size_per_gpu: 8

training:
  fix_generator: true
  remote_sync_path: hf://datasets/__namespace__/SER/qwen3_4b_base/${wandb.group_name}
  skip_dev_rollout: true
  generator_reward_components: [invalid_rewards]
  gen_invalid_penalty: 0.0
  question_source_mode: seeded_dev
  seed_dataset_path: ".cache/data/preprocessed/curriculum_pool/supergpqa_science_800.json"
  seed_examples_per_prompt: 4

algorithm:
  use_global_batch_norm: true
  solver_normalization_mode: none
  generator_normalization_mode: none

benchmark_eval:
  enabled: true
  use_public_eval_prompt: false

wandb:
  project_name: self-evolution-v3_2-qwen3-4b-base
  group_name: FW-Alr_2e-6-DrGRPO-TIS_token-seeded_dev
