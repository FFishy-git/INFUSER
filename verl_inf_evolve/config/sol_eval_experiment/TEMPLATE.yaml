# @package _global_
#
# Template override for the common solver-eval case: evaluate one or more
# checkpoints from a training run on the full default benchmark suite.
#
# Replace all angle-bracket placeholders before running. Keep filled-in
# credentials, private paths, account names, and run IDs out of committed
# configs.
#
# Usage:
#   python -m verl_inf_evolve.sol_eval.sol_eval sol_eval_experiment=TEMPLATE

eval:
  run_name: <TRAINING_RUN_NAME>
  # Training run output root. Examples:
  #   hf://datasets/__namespace__/<HF_DATASET_REPO>/<MODEL_TAG>/<TRAINING_RUN_NAME>
  #   s3://<BUCKET>/<PREFIX>/<TRAINING_RUN_NAME>
  remote_sync_path: "hf://datasets/__namespace__/<HF_DATASET_REPO>/<MODEL_TAG>/<TRAINING_RUN_NAME>"
  model_path: <MODEL_OR_LOCAL_HF_PATH>        # e.g. Qwen/Qwen3-8B-Base
  checkpoints: [<CHECKPOINT_STEP>]            # e.g. [95], or [-1] for base model only
  cleanup_checkpoints: true

solver:
  model:
    path: ${eval.model_path}

wandb:
  enabled: false
  entity: <WANDB_ENTITY>
  project_name: <WANDB_PROJECT>
  group_name: <TRAINING_RUN_NAME>
  run_name: "eval_<TRAINING_RUN_NAME>_${now:%Y%m%d_%H%M%S}"

remote:
  # Explicit HF API token (highest priority). Prefer hf_token_env_var instead.
  hf_token: null
  # Name of the environment variable holding the HF token.
  hf_token_env_var: HF_TOKEN
  # Git revision / branch in the HF dataset repo.
  hf_revision: main
  # Approximate process-wide HF upload cap in megabits/sec. Null = unlimited.
  hf_upload_limit_mbps: null
  # Approximate process-wide HF download cap in megabits/sec. Null = unlimited.
  hf_download_limit_mbps: null
  # Max worker threads for snapshot_download(). Null = huggingface_hub default.
  hf_snapshot_max_workers: null
  # Placeholder string that triggers namespace auto-discovery for HF dataset URIs.
  hf_namespace_placeholder: __namespace__
  # Optional env var whose value is a JSON array describing the HF token pool.
  hf_token_pool_env_var: HF_TOKEN_POOL_JSON
  # Optional path to a local JSON file containing HF token pool entries.
  hf_token_pool_file: null
  # Optional inline HF token pool entries.
  hf_token_pool: []
