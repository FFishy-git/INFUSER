# Job type: training_interactive
# Interactive training pod with the same setup as direct training.

APP_LABEL=training-interactive
PYTHON_MODULE=verl_inf_evolve.main
LOG_PREFIX=train

REQUIRED_DATA_PATHS=(
  ".cache/data/preprocessed/documents.json"
  ".cache/data/preprocessed/curriculum_pool/supergpqa_science_800.json"
)

# "hydra" → python -m MODULE hydra.run.dir=. ...
# "script" → python MODULE ...
# "interactive" → prepare env, then keep the pod alive for manual submission.
LAUNCH_MODE=interactive

# Empty → uses CONFIG_GROUP variable for experiment selection.
HYDRA_CONFIG_KEY=

# Empty → derive the same config-group tag as normal training.
JOB_NAME_PREFIX=

# Default resources (overridden by --gpu, --memory, --cpu, --queue)
DEFAULT_GPU=8
DEFAULT_MEMORY=512
DEFAULT_CPU=32
DEFAULT_QUEUE=skypilot-jobs-8-gpu

# Interactive pods are intentionally quiet between manual runs.
WATCHER_IDLE_THRESHOLD=0
WATCHER_STUCK_KILL_THRESHOLD=0
