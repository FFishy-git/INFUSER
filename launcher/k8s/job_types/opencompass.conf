# Job type: opencompass
# OpenCompass benchmark evaluation with vLLM backend (DP=8, TP=1).

APP_LABEL=opencompass
PYTHON_MODULE=scripts/run_opencompass.py
LOG_PREFIX=opencompass

LAUNCH_MODE=script
HYDRA_CONFIG_KEY=
JOB_NAME_PREFIX=oc

DEFAULT_GPU=8
DEFAULT_MEMORY=512
# 8-GPU H100 nodes expose 127900m allocatable CPU after kube/system reservations,
# so requesting the full 128 CPUs leaves pods permanently unschedulable.
DEFAULT_CPU=120
DEFAULT_QUEUE=skypilot-jobs-8-gpu
