# Job type: training
# Joint generator-solver self-evolution training.

APP_LABEL=training
PYTHON_MODULE=verl_inf_evolve.main
LOG_PREFIX=train

REQUIRED_DATA_PATHS=(
  ".cache/data/preprocessed/documents.json"
  ".cache/data/preprocessed/curriculum_pool/supergpqa_science_800.json"
)

# "hydra" → python -m MODULE hydra.run.dir=. ...
# "script" → python MODULE ...  (argparse-based tools)
LAUNCH_MODE=hydra

# Hydra config key for experiment selection.
# Empty → uses CONFIG_GROUP variable (training uses config groups).
HYDRA_CONFIG_KEY=

# Job name prefix. Empty → derives tag from config_group_short.
JOB_NAME_PREFIX=

# Default resources (overridden by --gpu, --memory, --cpu, --queue)
DEFAULT_GPU=8
DEFAULT_MEMORY=512
DEFAULT_CPU=32
DEFAULT_QUEUE=skypilot-jobs-8-gpu
